<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康与健身 Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message.error { align-items: center; }
        .message.error .message-content { background: #fee; color: #c33; border: 1px solid #fcc; }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e9ecef;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .input-container input:focus { border-color: #667eea; }
        .input-container button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        .input-container button:hover { background: #5a67d8; }
        .input-container button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { padding: 12px 16px; color: #999; font-style: italic; }
        .status-bar {
            padding: 10px 20px;
            background: #e9ecef;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .status-online { color: #10b981; }
        .status-offline { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃 健康与健身 Agent</h1>
            <p>你的智能健康伙伴 - 随时为你提供运动、饮食建议和激励</p>
        </div>
        <div class="status-bar">
            <span>👤 用户: me</span>
            <span id="status-indicator">🟡 连接中...</span>
        </div>
        <div class="chat-container" id="chat-container">
            <div class="message assistant">
                <div class="message-content">
                    你好！我是你的健康与健身助手 🎯<br><br>
                    我可以帮你：<br>
                    • 制定运动计划<br>
                    • 记录健身活动<br>
                    • 提供饮食建议<br>
                    • 查询天气信息<br>
                    • 给你加油鼓励<br><br>
                    想聊聊你的健康目标吗？
                </div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="输入你的消息..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()" disabled>发送 ✨</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        const USER_ID = 'me';
        const API_KEY = 'sk-aaf9ea6f4d91454e82a0f25c75e770f4';
        let sessionId = null;
        let isInitialized = false;

        function updateStatus(text, status) {
            const indicator = document.getElementById('status-indicator');
            if (status === 'online') indicator.innerHTML = '🟢 ' + text;
            else if (status === 'offline') indicator.innerHTML = '🔴 ' + text;
            else indicator.innerHTML = '🟡 ' + text;
        }

        async function initAgent() {
            console.log('🚀 开始初始化...');
            updateStatus('初始化中...', 'loading');

            try {
                const response = await fetch(`${API_BASE}/init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        api_key: API_KEY,
                        model: 'qwen-max'
                    })
                });

                const data = await response.json();
                console.log('初始化响应:', data);

                if (response.ok) {
                    isInitialized = true;
                    updateStatus('已就绪', 'online');
                    document.getElementById('send-btn').disabled = false;
                    console.log('✅ 初始化成功！');
                } else {
                    updateStatus('初始化失败', 'offline');
                    console.error('初始化失败:', data);
                }
            } catch (error) {
                console.error('初始化异常:', error);
                updateStatus('连接失败', 'offline');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            if (!isInitialized) {
                addMessage('Agent 还未初始化，请稍后重试...', 'error');
                return;
            }

            addMessage(message, 'user');
            input.value = '';

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            const loadingDiv = addLoadingMessage();

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionId = data.session_id;
                    loadingDiv.remove();
                    addMessage(data.message, 'assistant');

                    if (data.suggestions && data.suggestions.length > 0) {
                        addMessage('💡 小建议：\n• ' + data.suggestions.join('\n• '), 'assistant');
                    }
                } else {
                    loadingDiv.remove();
                    addMessage(`抱歉：${data.detail || '未知错误'}`, 'error');
                }
            } catch (error) {
                console.error('网络错误:', error);
                loadingDiv.remove();
                addMessage('网络连接失败，请检查服务是否运行', 'error');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function addMessage(content, role) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addLoadingMessage() {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loading-message';
            div.innerHTML = '<div class="message-content loading">🤔 思考中...</div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 页面加载完成');
            initAgent();
        });
    </script>
</body>
</html>
